name: Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Run Tests
        # Inject pytest-cov on the fly and output the XML report
        run: uv run --with pytest-cov --all-extras pytest --cov=src/dynamic_des --cov-report=xml

      # - name: Upload coverage reports to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     file: ./coverage.xml

  docs:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Mike needs the full history to pull the gh-pages branch

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build and Deploy Docs (Versioned)
        run: |
          # Configure Git for the bot commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Dynamically extract the version string from pyproject.toml
          VERSION=$(grep -m 1 '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "Extracted version: $VERSION"

          # Deploy the extracted version and tag it as 'latest'
          uv run mike deploy --push --update-aliases $VERSION latest

          # Set 'latest' as the default landing page when navigating to the root URL
          uv run mike set-default --push latest
