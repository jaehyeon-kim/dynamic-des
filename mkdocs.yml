site_name: Dynamic DES
site_description: Real-time SimPy control plane for event-driven digital twins.
repo_url: https://github.com/jaehyeon-kim/dynamic-des
repo_name: dynamic-des

theme:
  name: material
  favicon: assets/favicon.png
  logo: assets/favicon.png
  palette:
    - scheme: default
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  highlightjs: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_full_path: false # Removes 'dynamic_des.core...' prefix
            show_root_toc_entry: true # Ensures class appears in TOC
            show_root_heading: true # Shows the class name as a heading
            show_category_heading: true # Groups methods, attributes, etc.

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Basics (Tutorials):
      - 1. Your First Factory (Local): tutorials/01-first-factory.md
      - 2. Adding Randomness and Rules: tutorials/02-distributions-resources.md
      - 3. Going Distributed (Kafka): tutorials/03-connecting-kafka.md
  - Core Architecture:
      - Standard vs. Low-Level Paradigms: architecture/paradigms.md
      - Simulation Context: architecture/context.md
      - Realtime Environment: architecture/environment.md
      - Ingress and Egress Connectors: architecture/connectors.md
      - Resources and Containers: architecture/resources.md
  - Examples:
      - Standard API (Declarative):
          - Local Simulation: examples/declarative/local.md
          - Kafka Digital Twin and UI: examples/declarative/kafka.md
          - Fast-Forward to Data Lake: examples/declarative/history.md
          - Relational DB (Postgres): examples/declarative/postgres.md
      - Low-Level API (Imperative):
          - Local Simulation: examples/imperative/local.md
          - Kafka Digital Twin and UI: examples/imperative/kafka.md
          - Fast-Forward to Data Lake: examples/imperative/history.md
          - Relational DB (Postgres): examples/imperative/postgres.md
  - Advanced Guides:
      - Complex Routing (Kafka): guides/complex-routing.md
      - Advanced Serialization (Avro and Pydantic): guides/avro-and-pydantic.md
      - Connecting to Secure Kafka: guides/kafka-security.md
  - Advanced Control Flows:
      - Multi-Resource Handoffs (Hybrid Pattern): guides/multi-resource-handoffs.md
      - Preemptive Machine Breakdowns (Hybrid Pattern): guides/preemptive-breakdowns.md
      - Absolute Edge Cases (Dynamic Topology): guides/dynamic-topology.md
  - API Reference: api.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
