site_name: Dynamic DES
site_description: Real-time SimPy control plane for event-driven digital twins.
repo_url: https://github.com/jaehyeon-kim/dynamic-des
repo_name: dynamic-des

theme:
  name: material
  favicon: assets/favicon.png
  logo: assets/favicon.png
  palette:
    - scheme: default
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  highlightjs: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_full_path: false # Removes 'dynamic_des.core...' prefix
            show_root_toc_entry: true # Ensures class appears in TOC
            show_root_heading: true # Shows the class name as a heading
            show_category_heading: true # Groups methods, attributes, etc.

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts: concepts.md
  - API Reference: api.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
